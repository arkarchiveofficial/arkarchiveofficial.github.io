<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK | Manual Update Panel</title>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otplib/12.0.1/otplib-browser.all.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --cyan: #00BFFF; --pink: #FF1493; --dark: #0f172a; --light: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--light); margin: 0; padding: 0; color: #1e293b; }
        
        /* Secure Login Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 12px; width: 320px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-top: 5px solid var(--cyan);
        }
        .login-box h2 { margin-bottom: 20px; color: var(--dark); font-size: 18px; letter-spacing: 1px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 14px; text-align: center; }
        .login-box button { background: var(--dark); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .login-box button:hover { background: var(--cyan); }

        /* Original Design Styles */
        .nav { background: var(--dark); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav h2 { margin: 0; font-size: 18px; text-transform: uppercase; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid var(--cyan); }
        .card.pink { border-top-color: var(--pink); }
        h3 { margin-top: 0; font-size: 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #64748b; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .btn-update { background: var(--cyan); color: white; }
        .btn-add { background: var(--pink); color: white; }
        .data-list { margin-top: 20px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
        .item { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 12px; }
        .del-btn { color: #ef4444; cursor: pointer; }
        .logout-btn { background: transparent; color: #94a3b8; border: 1px solid #334155; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
    </style>
</head>

<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2><i class="fas fa-shield-alt"></i> ARK SYSTEM</h2>
            
            <div id="step-1">
                <input type="password" id="master-pass" placeholder="System Password">
                <button onclick="checkPass()">NEXT STEP</button>
            </div>

            <div id="step-2" style="display:none;">
                <p style="font-size:11px; color:#64748b; margin-bottom:10px;">Enter 6-digit Authenticator Code</p>
                <input type="text" id="otp-val" placeholder="000000" maxlength="6" style="letter-spacing: 5px; font-weight: bold;">
                <button onclick="checkOTP()" style="background:var(--pink);">VERIFY ACCESS</button>
            </div>
            
            <p id="err" style="color: #ef4444; font-size: 11px; margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="secure-content" style="display:none;">
        <div class="nav">
            <h2><i class="fas fa-tools"></i> ARK Update Panel</h2>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
                <div id="db-status" style="font-size: 10px; color: #4ade80;"><i class="fas fa-circle"></i> Online</div>
            </div>
        </div>

        <div class="container">
            <div class="card">
                <h3><i class="fas fa-chart-line"></i> Live Stats (Website Header)</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <div class="input-group"><label>Collected ($)</label><input type="number" id="s-coll"></div>
                    <div class="input-group"><label>Trees Bought</label><input type="number" id="s-bought"></div>
                    <div class="input-group"><label>Handed Over</label><input type="number" id="s-deliv"></div>
                </div>
                <button class="btn btn-update" onclick="saveStats()">Update Main Stats</button>
            </div>

            <div class="card pink">
                <h3><i class="fas fa-images"></i> Add Mission Photo</h3>
                <div class="input-group">
                    <label>Image URL (Direct Link)</label>
                    <input type="text" id="img-url" placeholder="https://example.com/photo.jpg">
                </div>
                <button class="btn btn-add" onclick="addPhoto()">Push to Gallery</button>
                <div id="gallery-preview" class="data-list"></div>
            </div>

            <div class="card">
                <h3><i class="fas fa-user-tag"></i> Add New Donor Plot</h3>
                <div class="input-group"><label>Donor Full Name</label><input type="text" id="d-name"></div>
                <div class="input-group"><label>Photo URL</label><input type="text" id="d-photo"></div>
                <div class="input-group"><label>Social Link</label><input type="text" id="d-link"></div>
                <div class="input-group"><label>Trees Donated</label><input type="number" id="d-trees"></div>
                <button class="btn btn-update" onclick="addDonor()">Create Legacy Plot</button>
            </div>
        </div>
    </div>

    <script>
        // --- 🛡️ HIDDEN KEYS (OBFUSCATED) ---
        // Pass: KAWSARahmed22@@ | Secret: JBSWY3DPEHPK3PXP
        const _0x8c12 = ["\x4b\x41\x57\x53\x41\x52\x61\x68\x6d\x65\x64\x32\x32\x40\x40", "\x4a\x42\x53\x57\x59\x33\x44\x50\x45\x48\x50\x4b\x33\x50\x58\x50"];

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
            authDomain: "the-5k-elite-legacy.firebaseapp.com",
            databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
            projectId: "the-5k-elite-legacy",
            storageBucket: "the-5k-elite-legacy.firebasestorage.app",
            appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- Security Logic ---
        function checkPass() {
            if(document.getElementById('master-pass').value === _0x8c12[0]) {
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').style.display = 'block';
                document.getElementById('err').innerText = "";
            } else {
                document.getElementById('err').innerText = "INVALID SYSTEM PASSWORD";
            }
        }

        function checkOTP() {
            const code = document.getElementById('otp-val').value;
            if(otplib.authenticator.check(code, _0x8c12[1])) {
                sessionStorage.setItem('ark_manual_auth', 'active');
                initPanel();
            } else {
                document.getElementById('err').innerText = "OTP VERIFICATION FAILED";
            }
        }

        function initPanel() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('secure-content').style.display = 'block';
            startDataSync();
        }

        function handleLogout() {
            sessionStorage.clear();
            location.reload();
        }

        window.onload = () => {
            if(sessionStorage.getItem('ark_manual_auth') === 'active') initPanel();
        };

        // --- Original Functions (Design Protected) ---
        function startDataSync() {
            db.ref('stats').on('value', s => {
                const d = s.val() || {collected:0, bought:0, delivered:0};
                document.getElementById('s-coll').value = d.collected;
                document.getElementById('s-bought').value = d.bought;
                document.getElementById('s-deliv').value = d.delivered;
            });

            db.ref('gallery').on('value', s => {
                const div = document.getElementById('gallery-preview');
                div.innerHTML = '<strong>Live Gallery Preview:</strong><br>';
                s.forEach(child => {
                    div.innerHTML += `
                        <div class="item">
                            <span>${child.val().substring(0, 35)}...</span>
                            <i class="fas fa-trash del-btn" onclick="deleteItem('gallery/${child.key}')"></i>
                        </div>`;
                });
            });
        }

        function saveStats() {
            db.ref('stats').set({
                collected: parseInt(document.getElementById('s-coll').value) || 0,
                bought: parseInt(document.getElementById('s-bought').value) || 0,
                delivered: parseInt(document.getElementById('s-deliv').value) || 0
            }).then(() => alert("Stats Synchronized!"));
        }

        function addPhoto() {
            const url = document.getElementById('img-url').value;
            if(url) db.ref('gallery').push(url).then(() => document.getElementById('img-url').value = '');
        }

        function addDonor() {
            const name = document.getElementById('d-name').value;
            const photo = document.getElementById('d-photo').value;
            if(name && photo) {
                db.ref('legacy_archive').push({
                    name: name, photo: photo,
                    link: document.getElementById('d-link').value || "#",
                    trees: document.getElementById('d-trees').value || 0,
                    timestamp: Date.now()
                }).then(() => {
                    alert("Donor Added!");
                    document.getElementById('d-name').value = '';
                    document.getElementById('d-photo').value = '';
                });
            }
        }

        function deleteItem(path) {
            if(confirm("Delete this item permanently?")) db.ref(path).remove();
        }
    </script>
</body>
</html>
