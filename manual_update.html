<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK | Management</title>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --cyan: #00BFFF; --pink: #FF1493; --dark: #0f172a; --light: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--light); margin: 0; padding: 0; color: #1e293b; }
        
        #entry-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .entry-box {
            background: white; padding: 30px; border-radius: 12px; width: 320px; text-align: center;
        }
        .entry-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; text-align: center; }
        .entry-box button { background: var(--cyan); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .nav { background: var(--dark); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav h2 { margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 4px solid var(--cyan); }
        .card.pink { border-top-color: var(--pink); }

        h3 { margin-top: 0; font-size: 16px; color: var(--dark); display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        h3 i { color: var(--cyan); }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #64748b; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; box-sizing: border-box; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-update { background: var(--cyan); color: white; }
        .btn-add { background: var(--pink); color: white; }

        .data-list { margin-top: 20px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
        .item { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
        .del-btn { color: #ef4444; cursor: pointer; }
        .exit-btn { background: transparent; color: #94a3b8; border: 1px solid #334155; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
    </style>
</head>

<body>

    <div id="entry-gate">
        <div class="entry-box">
            <h2 style="font-size: 16px; margin-bottom: 15px; color: #334155;">ARK DATABASE CONNECTOR</h2>
            <input type="text" id="k-input" placeholder="Input Identity Reference" onkeypress="if(event.key === 'Enter') runVerify()">
            <button onclick="runVerify()">Initiate Connection</button>
        </div>
    </div>

    <div id="main-interface" style="display:none;">
        <div class="nav">
            <h2><i class="fas fa-tools"></i> ARK Update Panel</h2>
            <button class="exit-btn" onclick="terminate()">Exit System</button>
        </div>

        <div class="container">
            <div class="card">
                <h3><i class="fas fa-chart-line"></i> Live Stats (Website Header)</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <div class="input-group"><label>Collected ($)</label><input type="number" id="s-coll"></div>
                    <div class="input-group"><label>Trees Bought</label><input type="number" id="s-bought"></div>
                    <div class="input-group"><label>Handed Over</label><input type="number" id="s-deliv"></div>
                </div>
                <button class="btn btn-update" onclick="saveStats()">Update Main Stats</button>
            </div>

            <div class="card pink">
                <h3><i class="fas fa-images"></i> Add Mission Photo</h3>
                <div class="input-group"><label>Image URL (Direct Link)</label><input type="text" id="img-url"></div>
                <button class="btn btn-add" onclick="addPhoto()">Push to Gallery</button>
                <div id="gallery-preview" class="data-list"></div>
            </div>

            <div class="card">
                <h3><i class="fas fa-user-tag"></i> Add New Donor Plot</h3>
                <div class="input-group"><label>Donor Full Name</label><input type="text" id="d-name"></div>
                <div class="input-group"><label>Photo URL</label><input type="text" id="d-photo"></div>
                <div class="input-group"><label>Website / Social Link</label><input type="text" id="d-link"></div>
                <div class="input-group"><label>Total Trees Donated</label><input type="number" id="d-trees"></div>
                <button class="btn btn-update" onclick="addDonor()">Create Legacy Plot</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
            authDomain: "the-5k-elite-legacy.firebaseapp.com",
            databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
            projectId: "the-5k-elite-legacy",
            storageBucket: "the-5k-elite-legacy.firebasestorage.app",
            messagingSenderId: "440824313752",
            appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function runVerify() {
            const val = document.getElementById('k-input').value;
            const ref = "TTapBkTqrDnzHbWzek6wSBUTcJKFmR8Ws6";

            if (val === ref) {
                sessionStorage.setItem('ark_session_active', '1');
                document.getElementById('entry-gate').style.display = 'none';
                document.getElementById('main-interface').style.display = 'block';
                loadData();
            } else {
                alert("Reference Code Invalid");
                document.getElementById('k-input').value = '';
            }
        }

        if(sessionStorage.getItem('ark_session_active') === '1') {
            document.getElementById('entry-gate').style.display = 'none';
            document.getElementById('main-interface').style.display = 'block';
            window.onload = loadData;
        }

        function terminate() {
            sessionStorage.removeItem('ark_session_active');
            location.reload();
        }

        function loadData() {
            db.ref('stats').on('value', s => {
                const d = s.val() || {collected:0, bought:0, delivered:0};
                document.getElementById('s-coll').value = d.collected;
                document.getElementById('s-bought').value = d.bought;
                document.getElementById('s-deliv').value = d.delivered;
            });

            db.ref('gallery').on('value', s => {
                const div = document.getElementById('gallery-preview');
                div.innerHTML = '<strong>Data Stream:</strong><br>';
                s.forEach(child => {
                    div.innerHTML += `<div class="item"><span>${child.val().substring(0, 35)}...</span><i class="fas fa-trash del-btn" onclick="deleteItem('gallery/${child.key}')"></i></div>`;
                });
            });
        }

        function saveStats() {
            db.ref('stats').set({
                collected: parseInt(document.getElementById('s-coll').value) || 0,
                bought: parseInt(document.getElementById('s-bought').value) || 0,
                delivered: parseInt(document.getElementById('s-deliv').value) || 0
            }).then(() => alert("Cloud Synced"));
        }

        function addPhoto() {
            const url = document.getElementById('img-url').value;
            if(url) {
                db.ref('gallery').push(url);
                document.getElementById('img-url').value = '';
            }
        }

        function addDonor() {
            const donor = {
                name: document.getElementById('d-name').value,
                photo: document.getElementById('d-photo').value,
                link: document.getElementById('d-link').value || "#",
                trees: document.getElementById('d-trees').value || 0,
                timestamp: Date.now()
            };
            if(donor.name && donor.photo) {
                db.ref('legacy_archive').push(donor).then(() => {
                    alert("Plot Registered");
                    ['d-name', 'd-photo', 'd-link', 'd-trees'].forEach(id => document.getElementById(id).value = '');
                });
            }
        }

        function deleteItem(path) {
            if(confirm("Confirm Removal?")) db.ref(path).remove();
        }
    </script>
</body>
</html>
