<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK | Manual Data Update</title>
    
    <script>
        function checkAccess() {
            // আপনার দেওয়া নির্দিষ্ট পাসওয়ার্ড
            const pass = "zoomlink34@gmail.com";
            let enteredPass = prompt("Admin Access Required:");
            
            if (enteredPass !== pass) {
                alert("Access Denied!");
                document.body.innerHTML = "<div style='text-align:center; margin-top:100px; font-family:sans-serif;'><h1 style='color:red;'>403 - FORBIDDEN</h1><p>You do not have permission to access this manual update tool.</p></div>";
                window.stop();
            } else {
                document.getElementById('update-panel').style.display = 'block';
            }
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --cyan: #00BFFF; --pink: #FF1493; --black: #111; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .update-card { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid #333; width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h2 { font-size: 18px; text-transform: uppercase; letter-spacing: 2px; color: var(--cyan); margin-bottom: 30px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
        
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; background: #222; border: 1px solid #444; padding: 12px; color: #fff; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--cyan); }

        .btn-push { width: 100%; background: var(--pink); color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-push:hover { transform: scale(1.02); filter: brightness(1.1); }
        
        .back-link { display: block; text-align: center; margin-top: 20px; color: #555; text-decoration: none; font-size: 12px; }
    </style>
</head>

<body onload="checkAccess()">

<div id="update-panel" style="display:none;">
    <div class="update-card">
        <h2>Manual Sync Panel</h2>
        
        <div class="field">
            <label>Total Collected ($)</label>
            <input type="number" id="m-collected" placeholder="Current: $0">
        </div>

        <div class="field">
            <label>Total Trees Bought</label>
            <input type="number" id="m-bought" placeholder="Current: 0">
        </div>

        <div class="field">
            <label>Total Handed Over</label>
            <input type="number" id="m-delivered" placeholder="Current: 0">
        </div>

        <button class="btn-push" onclick="pushUpdate()">Push Live Changes</button>
        
        <a href="#" onclick="window.history.back()" class="back-link">Return to Dashboard</a>
    </div>
</div>

<script>
    // Firebase Configuration (অক্ষত)
    const firebaseConfig = {
        apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
        authDomain: "the-5k-elite-legacy.firebaseapp.com",
        databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
        projectId: "the-5k-elite-legacy",
        storageBucket: "the-5k-elite-legacy.firebasestorage.app",
        messagingSenderId: "440824313752",
        appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // বর্তমান ডেটা লোড করা হচ্ছে যাতে এডিট করা সহজ হয়
    db.ref('stats').on('value', snap => {
        const data = snap.val() || { collected: 0, bought: 0, delivered: 0 };
        document.getElementById('m-collected').value = data.collected;
        document.getElementById('m-bought').value = data.bought;
        document.getElementById('m-delivered').value = data.delivered;
    });

    function pushUpdate() {
        const c = document.getElementById('m-collected').value;
        const b = document.getElementById('m-bought').value;
        const d = document.getElementById('m-delivered').value;

        if(confirm("Confirm Manual Overwrite? This will update the main website immediately.")) {
            db.ref('stats').set({
                collected: parseInt(c) || 0,
                bought: parseInt(b) || 0,
                delivered: parseInt(d) || 0
            }).then(() => {
                alert("Database Synchronized!");
            }).catch(err => {
                alert("Error: " + err.message);
            });
        }
    }
</script>

</body>
</html>
