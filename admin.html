<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK ADMIN | Global Control Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <style>
        :root { --cyan: #00BFFF; --pink: #FF1493; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        
        /* Login UI */
        .login-container { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid var(--cyan); }
        .login-container input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: var(--dark); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Admin UI */
        .container { max-width: 1000px; margin: 0 auto; display: none; }
        header { background: var(--dark); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h2 { border-left: 5px solid var(--cyan); padding-left: 15px; margin-bottom: 20px; color: #333; font-size: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-save { background: var(--cyan); color: white; width: 100%; }
        .btn-add { background: var(--pink); color: white; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; font-size: 14px; }
        .delete-btn { color: red; cursor: pointer; font-weight: bold; }
        .logout-btn { background: #ef4444; color: white; font-size: 12px; }
    </style>
</head>
<body>

<div id="login-section" class="login-container">
    <h2 style="border:none; padding:0;">ARK Admin Access</h2>
    <input type="text" id="admin-name" placeholder="Admin Name">
    <input type="email" id="admin-email" placeholder="Email Address">
    <input type="text" id="admin-mobile" placeholder="Mobile Number">
    <input type="password" id="admin-password" placeholder="Password">
    <button class="btn-login" onclick="handleLogin()">SECURE LOGIN</button>
    <p id="login-error" style="color:red; font-size:12px; margin-top:10px;"></p>
</div>

<div id="admin-content" class="container">
    <header>
        <h1>ARK ARCHIVE ADMIN</h1>
        <button class="logout-btn" onclick="handleLogout()">LOGOUT</button>
    </header>

    <div class="card">
        <h2>Section 1: Live Stats Control</h2>
        <div class="grid-3">
            <div><label>Collected ($)</label><input type="number" id="input-collected"></div>
            <div><label>Trees Bought</label><input type="number" id="input-bought"></div>
            <div><label>Handed Over</label><input type="number" id="input-delivered"></div>
        </div>
        <button class="btn-save" onclick="updateStats()">UPDATE LIVE STATS</button>
    </div>

    <div class="card">
        <h2>Section 2: Mission Gallery</h2>
        <input type="text" id="gallery-url" placeholder="Paste Image URL here...">
        <button class="btn-add" onclick="addToGallery()">ADD TO GALLERY</button>
        <div id="gallery-list" style="margin-top:15px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
    </div>

    <div class="card">
        <h2>Section 3: Legacy Archive</h2>
        <div class="grid-3">
            <input type="text" id="donor-name" placeholder="Donor Name">
            <input type="text" id="donor-photo" placeholder="Photo URL">
            <input type="text" id="donor-link" placeholder="Social Link">
        </div>
        <input type="number" id="donor-trees" placeholder="Number of Trees">
        <button class="btn-add" style="background: var(--cyan);" onclick="addToArchive()">ADD TO LEGACY GRID</button>
        <table id="archive-table">
            <thead><tr><th>Name</th><th>Trees</th><th>Action</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h2>Section 4: Recent Donation Requests</h2>
        <div id="request-list"><p>Loading requests...</p></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
        authDomain: "the-5k-elite-legacy.firebaseapp.com",
        databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
        projectId: "the-5k-elite-legacy",
        storageBucket: "the-5k-elite-legacy.firebasestorage.app",
        messagingSenderId: "440824313752",
        appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // Security Data (ASCII Obfuscated)
    const _vName = [75, 85, 76, 83, 85, 77]; // KULSUM
    const _vMail = [122, 111, 111, 109, 108, 105, 110, 107, 51, 52, 64, 103, 109, 97, 105, 108, 46, 99, 111, 109]; // zoomlink34@gmail.com
    const _vMob = [48, 49, 55, 49, 56, 49, 55, 48, 54, 56, 53]; // 01718170685
    const _vPass = [75, 65, 87, 83, 65, 82, 97, 104, 109, 101, 100, 50, 50, 64, 64]; // KAWSARahmed22@@

    const _decode = (arr) => arr.map(c => String.fromCharCode(c)).join('');

    function handleLogin() {
        const name = document.getElementById('admin-name').value.toUpperCase();
        const email = document.getElementById('admin-email').value.toLowerCase();
        const mobile = document.getElementById('admin-mobile').value;
        const password = document.getElementById('admin-password').value;

        if (name === _decode(_vName) && email === _decode(_vMail) && mobile === _decode(_vMob) && password === _decode(_vPass)) {
            // Authentication bypass to show content, using Firebase for underlying session check if needed
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            initApp();
        } else {
            document.getElementById('login-error').innerText = "Access Denied: Invalid Credentials";
        }
    }

    function handleLogout() {
        location.reload(); // Refresh forces relogin as requested
    }

    function initApp() {
        // Stats Logic
        db.ref('stats').on('value', snap => {
            const data = snap.val() || { collected: 0, bought: 0, delivered: 0 };
            document.getElementById('input-collected').value = data.collected;
            document.getElementById('input-bought').value = data.bought;
            document.getElementById('input-delivered').value = data.delivered;
        });

        // Gallery Logic
        db.ref('gallery').on('value', snap => {
            const list = document.getElementById('gallery-list');
            list.innerHTML = '';
            snap.forEach(child => {
                list.innerHTML += `<div style="position:relative">
                    <img src="${child.val()}" width="80" height="60" style="border-radius:5px; object-fit:cover;">
                    <span class="delete-btn" style="position:absolute; top:-5px; right:-5px; background:white; border-radius:50%; padding:2px 6px; font-size:10px;" onclick="deleteItem('gallery/${child.key}')">×</span>
                </div>`;
            });
        });

        // Archive Logic
        db.ref('legacy_archive').on('value', snap => {
            const tbody = document.querySelector('#archive-table tbody');
            tbody.innerHTML = '';
            snap.forEach(child => {
                const d = child.val();
                tbody.innerHTML += `<tr>
                    <td>${d.name}</td>
                    <td>${d.trees}</td>
                    <td><span class="delete-btn" onclick="deleteItem('legacy_archive/${child.key}')">Delete</span></td>
                </tr>`;
            });
        });

        // Requests Logic
        db.ref('donation_requests').on('value', snap => {
            const reqList = document.getElementById('request-list');
            reqList.innerHTML = '';
            if(!snap.exists()) reqList.innerHTML = '<p>No requests found.</p>';
            snap.forEach(child => {
                const r = child.val();
                reqList.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                    <span><strong>${r.name}</strong> - ${r.qty} trees</span>
                    <span class="delete-btn" onclick="deleteItem('donation_requests/${child.key}')">Remove</span>
                </div>`;
            });
        });
    }

    function updateStats() {
        db.ref('stats').set({
            collected: parseInt(document.getElementById('input-collected').value) || 0,
            bought: parseInt(document.getElementById('input-bought').value) || 0,
            delivered: parseInt(document.getElementById('input-delivered').value) || 0
        }).then(() => alert("Stats Updated!"));
    }

    function addToGallery() {
        const url = document.getElementById('gallery-url').value;
        if(url) {
            db.ref('gallery').push(url).then(() => document.getElementById('gallery-url').value = '');
        }
    }

    function addToArchive() {
        const name = document.getElementById('donor-name').value;
        const photo = document.getElementById('donor-photo').value;
        const link = document.getElementById('donor-link').value;
        const trees = document.getElementById('donor-trees').value;
        if(name) {
            db.ref('legacy_archive').push({ name, photo, link, trees }).then(() => alert("Added!"));
        }
    }

    function deleteItem(path) {
        if(confirm("Are you sure?")) db.ref(path).remove();
    }
</script>

</body>
</html>
