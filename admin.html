<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK | Admin Panel</title>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --cyan: #00BFFF; --pink: #FF1493; --dark: #0f172a; --light: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--light); margin: 0; padding: 0; color: #1e293b; }
        
        /* Initial Logic View */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .lock-box { background: white; padding: 40px; border-radius: 15px; width: 300px; text-align: center; }
        .lock-box input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        .lock-box button { background: var(--cyan); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Dashboard Design */
        .nav { background: var(--dark); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 4px solid var(--cyan); }
        .card.pink { border-top-color: var(--pink); }
        h3 { margin-top: 0; font-size: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #64748b; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-update { background: var(--cyan); color: white; }
        .btn-add { background: var(--pink); color: white; }
        .data-list { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .item { display: flex; justify-content: space-between; background: #f1f5f9; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
        .del-btn { color: #ef4444; cursor: pointer; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box">
            <h2 style="font-size: 18px; margin-bottom: 20px;">ARK MANAGEMENT</h2>
            <input type="text" id="pass-key" placeholder="Enter Access Code" onkeypress="if(event.key === 'Enter') access()">
            <button onclick="access()">Open Panel</button>
        </div>
    </div>

    <div id="admin-content" style="display:none;">
        <div class="nav">
            <h2>ARK Update Panel</h2>
            <button onclick="location.reload()" style="background:none; border:1px solid #444; color:#94a3b8; cursor:pointer; padding:5px 10px; border-radius:4px;">Logout</button>
        </div>

        <div class="container">
            <div class="card">
                <h3><i class="fas fa-chart-line"></i> Main Stats</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <div class="input-group"><label>Collected ($)</label><input type="number" id="s-coll"></div>
                    <div class="input-group"><label>Bought</label><input type="number" id="s-bought"></div>
                    <div class="input-group"><label>Delivered</label><input type="number" id="s-deliv"></div>
                </div>
                <button class="btn btn-update" onclick="saveStats()">Update Stats</button>
            </div>

            <div class="card pink">
                <h3><i class="fas fa-images"></i> Add Photo</h3>
                <div class="input-group"><label>Image URL</label><input type="text" id="img-url"></div>
                <button class="btn btn-add" onclick="addPhoto()">Add to Gallery</button>
                <div id="gallery-preview" class="data-list"></div>
            </div>

            <div class="card">
                <h3><i class="fas fa-user-tag"></i> Add Donor Plot</h3>
                <div class="input-group"><label>Name</label><input type="text" id="d-name"></div>
                <div class="input-group"><label>Photo URL</label><input type="text" id="d-photo"></div>
                <div class="input-group"><label>Link</label><input type="text" id="d-link"></div>
                <div class="input-group"><label>Trees</label><input type="number" id="d-trees"></div>
                <button class="btn btn-update" onclick="addDonor()">Save Plot</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
            authDomain: "the-5k-elite-legacy.firebaseapp.com",
            databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
            projectId: "the-5k-elite-legacy",
            storageBucket: "the-5k-elite-legacy.firebasestorage.app",
            messagingSenderId: "440824313752",
            appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function access() {
            const val = document.getElementById('pass-key').value;
            if (val === "KAWSARahmed22@@") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                start();
            } else {
                alert("Wrong Code");
            }
        }

        function start() {
            db.ref('stats').on('value', s => {
                const d = s.val() || {collected:0, bought:0, delivered:0};
                document.getElementById('s-coll').value = d.collected;
                document.getElementById('s-bought').value = d.bought;
                document.getElementById('s-deliv').value = d.delivered;
            });

            db.ref('gallery').on('value', s => {
                const div = document.getElementById('gallery-preview');
                div.innerHTML = '<strong>Recent Photos:</strong><br>';
                s.forEach(child => {
                    div.innerHTML += `<div class="item"><span>${child.val().substring(0, 30)}...</span><i class="fas fa-trash del-btn" onclick="deleteItem('gallery/${child.key}')"></i></div>`;
                });
            });
        }

        function saveStats() {
            db.ref('stats').set({
                collected: parseInt(document.getElementById('s-coll').value) || 0,
                bought: parseInt(document.getElementById('s-bought').value) || 0,
                delivered: parseInt(document.getElementById('s-deliv').value) || 0
            }).then(() => alert("Updated"));
        }

        function addPhoto() {
            const url = document.getElementById('img-url').value;
            if(url) {
                db.ref('gallery').push(url);
                document.getElementById('img-url').value = '';
            }
        }

        function addDonor() {
            const data = {
                name: document.getElementById('d-name').value,
                photo: document.getElementById('d-photo').value,
                link: document.getElementById('d-link').value || "#",
                trees: document.getElementById('d-trees').value || 0,
                timestamp: Date.now()
            };
            if(data.name && data.photo) {
                db.ref('legacy_archive').push(data).then(() => {
                    alert("Donor Saved");
                    ['d-name', 'd-photo', 'd-link', 'd-trees'].forEach(id => document.getElementById(id).value = '');
                });
            }
        }

        function deleteItem(path) {
            if(confirm("Delete?")) db.ref(path).remove();
        }
    </script>
</body>
</html>
