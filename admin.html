<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK | SECURE ADMIN GATEWAY</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #00BFFF; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        .auth-gate { width: 100%; max-width: 400px; background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .auth-gate h2 { text-align: center; margin-bottom: 30px; letter-spacing: 2px; color: var(--accent); }
        
        .field-group { margin-bottom: 18px; }
        .field-group label { display: block; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; color: #94a3b8; font-weight: 600; }
        .field-group input { width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 14px; box-sizing: border-box; transition: all 0.3s; }
        .field-group input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(0, 191, 255, 0.2); }
        
        .btn-access { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-access:hover { opacity: 0.9; transform: translateY(-1px); }

        .admin-view { display: none; width: 95%; max-width: 1100px; margin: 20px auto; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .panel-header { background: var(--card); padding: 20px 30px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent); }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 25px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #334155; }
        
        .status-msg { font-size: 12px; text-align: center; margin-top: 15px; height: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="gate-container" class="auth-gate">
    <h2>IDENTITY CHECK</h2>
    
    <div class="field-group">
        <label>Verification Name</label>
        <input type="text" id="_id_n" autocomplete="off" placeholder="NAME">
    </div>
    
    <div class="field-group">
        <label>System Email</label>
        <input type="email" id="_id_e" autocomplete="off" placeholder="EMAIL">
    </div>
    
    <div class="field-group">
        <label>Registered Mobile</label>
        <input type="text" id="_id_m" autocomplete="off" placeholder="MOBILE">
    </div>
    
    <div class="field-group">
        <label>Security Key</label>
        <input type="password" id="_id_p" placeholder="PASSWORD">
    </div>
    
    <button class="btn-access" onclick="attemptEntry()">SYNCHRONIZE</button>
    <div id="status" class="status-msg"></div>
</div>

<div id="panel-container" class="admin-view">
    <div class="panel-header">
        <h2 style="margin:0; font-size:20px; color:white;">ARK ARCHIVE v3.0</h2>
        <button onclick="location.reload()" style="background:#ef4444; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600;">TERMINATE SESSION</button>
    </div>

    <div class="grid-stats">
        <div class="stat-card">
            <h3 style="margin-top:0; color:var(--accent);">Live Statistics</h3>
            <input type="number" id="st_col" placeholder="Collected $">
            <input type="number" id="st_bgt" placeholder="Trees Bought">
            <input type="number" id="st_del" placeholder="Delivered">
            <button onclick="pushStats()" style="width:100%; background:var(--accent); color:black; border:none; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer;">UPDATE CLOUD</button>
        </div>

        <div class="stat-card">
            <h3 style="margin-top:0; color:#FF1493;">Asset Management</h3>
            <input type="text" id="gal_url" placeholder="Image Resource URL">
            <button onclick="pushAsset()" style="width:100%; background:#FF1493; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer;">DEPLOY ASSET</button>
        </div>
    </div>
</div>

<script>
    const _v1 = [75, 85, 76, 83, 85, 77];
    const _v2 = [122, 111, 111, 109, 108, 105, 110, 107, 51, 52, 64, 103, 109, 97, 105, 108, 46, 99, 111, 109];
    const _v3 = [48, 49, 55, 49, 56, 49, 55, 48, 54, 56, 53];
    const _v4 = [75, 65, 87, 83, 65, 82, 97, 104, 109, 101, 100, 50, 50, 64, 64];

    const firebaseConfig = {
        apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
        databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
        projectId: "the-5k-elite-legacy",
        appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
    };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    const _core = (d) => d.map(c => String.fromCharCode(c)).join('');

    function attemptEntry() {
        const n = document.getElementById('_id_n').value.toUpperCase();
        const e = document.getElementById('_id_e').value.toLowerCase();
        const m = document.getElementById('_id_m').value;
        const p = document.getElementById('_id_p').value;

        if (n === _core(_v1) && e === _core(_v2) && m === _core(_v3) && p === _core(_v4)) {
            document.getElementById('gate-container').style.display = 'none';
            document.getElementById('panel-container').style.display = 'block';
            document.body.style.alignItems = "flex-start";
            syncSystem();
        } else {
            const s = document.getElementById('status');
            s.style.color = "#ef4444";
            s.innerText = "CRITICAL: UNAUTHORIZED ACCESS ATTEMPT";
            setTimeout(() => s.innerText = "", 3000);
        }
    }

    function syncSystem() {
        rtdb.ref('stats').on('value', snap => {
            const d = snap.val() || { collected: 0, bought: 0, delivered: 0 };
            document.getElementById('st_col').value = d.collected;
            document.getElementById('st_bgt').value = d.bought;
            document.getElementById('st_del').value = d.delivered;
        });
    }

    function pushStats() {
        rtdb.ref('stats').set({
            collected: parseInt(document.getElementById('st_col').value) || 0,
            bought: parseInt(document.getElementById('st_bgt').value) || 0,
            delivered: parseInt(document.getElementById('st_del').value) || 0
        }).then(() => alert("Data Synchronized"));
    }

    function pushAsset() {
        const u = document.getElementById('gal_url').value;
        if(u) rtdb.ref('gallery').push(u).then(() => document.getElementById('gal_url').value = '');
    }
</script>
</body>
</html>
