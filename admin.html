<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK ADMIN | Global Control Panel</title>
    
    <script>
        // সিকিউরিটি চেক
        function checkAccess() {
            const pass = "KAWSARahmed22@@";
            let enteredPass = prompt("Please enter Admin Password to access:");
            
            if (enteredPass !== pass) {
                alert("Incorrect Password! Access Denied.");
                document.body.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif;">
                        <h1 style="color:red;">UNAUTHORIZED ACCESS</h1>
                        <button onclick="location.reload()">Try Again</button>
                    </div>`;
                window.stop();
            } else {
                document.getElementById('admin-content').style.display = 'block';
                initFirebase(); // পাসওয়ার্ড ঠিক থাকলে ডাটাবেস লোড হবে
            }
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --cyan: #00BFFF; --pink: #FF1493; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { background: var(--dark); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h2 { border-left: 5px solid var(--cyan); padding-left: 15px; margin-bottom: 20px; color: #333; font-size: 20px; }
        
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-save { background: var(--cyan); color: white; width: 100%; }
        .btn-add { background: var(--pink); color: white; margin-top: 10px; }
        .btn-save:hover, .btn-add:hover { opacity: 0.8; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; }
        .req-card { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { color: #ef4444; cursor: pointer; font-weight: bold; font-size: 13px; }

        @media (max-width: 600px) {
            .grid-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body onload="checkAccess()">

<div id="admin-content" style="display:none;">
    <div class="container">
        <header>
            <h1>ARK ARCHIVE ADMIN</h1>
            <div id="status-indicator" style="color: #4ade80;">● Database Connected</div>
        </header>

        <div class="card">
            <h2>Section 1: Live Stats Control</h2>
            <div class="grid-3">
                <div>
                    <label>Collected ($)</label>
                    <input type="number" id="input-collected" placeholder="0">
                </div>
                <div>
                    <label>Trees Bought</label>
                    <input type="number" id="input-bought" placeholder="0">
                </div>
                <div>
                    <label>Handed Over</label>
                    <input type="number" id="input-delivered" placeholder="0">
                </div>
            </div>
            <button class="btn-save" onclick="updateStats()">UPDATE LIVE STATS</button>
        </div>

        <div class="card">
            <h2>Section 2: Mission Gallery (Image Links)</h2>
            <input type="text" id="gallery-url" placeholder="Paste Image URL here...">
            <button class="btn-add" onclick="addToGallery()">ADD TO GALLERY</button>
            <div id="gallery-list" style="margin-top:15px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
        </div>

        <div class="card">
            <h2>Section 3: Add Donor to Legacy Archive</h2>
            <div class="grid-3">
                <input type="text" id="donor-name" placeholder="Donor Name">
                <input type="text" id="donor-photo" placeholder="Photo URL">
                <input type="text" id="donor-link" placeholder="Social/Web Link">
            </div>
            <input type="number" id="donor-trees" placeholder="Number of Trees">
            <button class="btn-add" style="background: var(--cyan);" onclick="addToArchive()">ADD TO LEGACY GRID</button>
            
            <div style="overflow-x: auto;">
                <table id="archive-table">
                    <thead>
                        <tr><th>Name</th><th>Trees</th><th>Action</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>Section 4: Recent Donation Requests</h2>
            <div id="request-list">
                <p>Checking for new requests...</p>
            </div>
        </div>
    </div>
</div>

<script>
    let db;

    function initFirebase() {
        const firebaseConfig = {
            apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
            authDomain: "the-5k-elite-legacy.firebaseapp.com",
            databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
            projectId: "the-5k-elite-legacy",
            storageBucket: "the-5k-elite-legacy.firebasestorage.app",
            messagingSenderId: "440824313752",
            appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
        };
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();

        loadStats();
        loadGallery();
        loadArchive();
        loadRequests();
    }

    // ১. Stats Logic
    function loadStats() {
        db.ref('stats').on('value', snap => {
            const data = snap.val() || { collected: 0, bought: 0, delivered: 0 };
            document.getElementById('input-collected').value = data.collected;
            document.getElementById('input-bought').value = data.bought;
            document.getElementById('input-delivered').value = data.delivered;
        });
    }

    function updateStats() {
        db.ref('stats').set({
            collected: parseInt(document.getElementById('input-collected').value) || 0,
            bought: parseInt(document.getElementById('input-bought').value) || 0,
            delivered: parseInt(document.getElementById('input-delivered').value) || 0
        }).then(() => alert("✅ Live Stats Updated!"));
    }

    // ২. Gallery Logic
    function addToGallery() {
        const url = document.getElementById('gallery-url').value;
        if(url) {
            db.ref('gallery').push(url).then(() => {
                document.getElementById('gallery-url').value = '';
            });
        }
    }

    function loadGallery() {
        db.ref('gallery').on('value', snap => {
            const list = document.getElementById('gallery-list');
            list.innerHTML = '';
            snap.forEach(child => {
                list.innerHTML += `<div style="position:relative">
                    <img src="${child.val()}" width="80" height="60" style="border-radius:5px; object-fit:cover;">
                    <span class="delete-btn" style="position:absolute; top:-5px; right:-5px; background:white; border-radius:50%; padding:2px 6px; box-shadow:0 2px 5px rgba(0,0,0,0.2);" onclick="deleteItem('gallery/${child.key}')">×</span>
                </div>`;
            });
        });
    }

    // ৩. Legacy Archive Logic
    function addToArchive() {
        const name = document.getElementById('donor-name').value;
        const photo = document.getElementById('donor-photo').value;
        const link = document.getElementById('donor-link').value;
        const trees = document.getElementById('donor-trees').value;

        if(name) {
            db.ref('legacy_archive').push({ 
                name, photo, link: link || "#", 
                trees: parseInt(trees) || 0,
                timestamp: Date.now()
            }).then(() => {
                alert("🌟 Added to Legacy Archive!");
                document.getElementById('donor-name').value = '';
                document.getElementById('donor-photo').value = '';
                document.getElementById('donor-link').value = '';
                document.getElementById('donor-trees').value = '';
            });
        }
    }

    function loadArchive() {
        db.ref('legacy_archive').on('value', snap => {
            const tbody = document.querySelector('#archive-table tbody');
            tbody.innerHTML = '';
            snap.forEach(child => {
                const d = child.val();
                tbody.innerHTML += `<tr>
                    <td>${d.name}</td>
                    <td>${d.trees} Trees</td>
                    <td><span class="delete-btn" onclick="deleteItem('legacy_archive/${child.key}')">Delete</span></td>
                </tr>`;
            });
        });
    }

    // ৪. Donation Requests Logic
    function loadRequests() {
        db.ref('donation_requests').on('value', snap => {
            const reqList = document.getElementById('request-list');
            reqList.innerHTML = '';
            if(!snap.exists()) {
                reqList.innerHTML = '<p style="color:#64748b;">No pending requests found.</p>';
                return;
            }
            
            snap.forEach(child => {
                const r = child.val();
                const date = r.timestamp ? new Date(r.timestamp).toLocaleString() : "Just now";
                reqList.innerHTML += `
                    <div class="req-card">
                        <div>
                            <strong style="color:var(--dark); font-size:16px;">${r.name}</strong> 
                            <span style="color:#64748b;">(${r.email || 'No email'})</span>
                            <br>
                            <span style="color:var(--cyan); font-weight:600;">Request: ${r.qty || 0} Trees</span>
                            <br><small style="color:#94a3b8;">${date}</small>
                        </div>
                        <span class="delete-btn" onclick="deleteItem('donation_requests/${child.key}')">Complete / Remove</span>
                    </div>`;
            });
        });
    }

    // Universal Delete Function
    function deleteItem(path) {
        if(confirm("Are you sure you want to delete this permanently?")) {
            db.ref(path).remove();
        }
    }
</script>

</body>
</html>
