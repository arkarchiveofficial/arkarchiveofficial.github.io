<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK MASTER ADMIN | Global Control</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #00BFFF; --accent: #FF1493; --dark: #121212; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; margin: 0; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: var(--dark); color: white; position: fixed; padding: 20px; }
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 5px solid var(--primary); }
        h3 { margin-top: 0; color: #333; border-left: 4px solid var(--primary); padding-left: 10px; }
        
        /* Input & Button */
        .input-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; min-width: 200px; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; padding: 12px 20px; }
        .btn-upload { background: var(--accent); color: white; min-width: 150px; }
        .btn-save { background: var(--primary); color: white; width: 100%; margin-top: 10px; font-size: 16px; }

        /* Gallery Preview Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .gal-card { position: relative; border-radius: 10px; overflow: hidden; height: 120px; border: 2px solid #eee; background: #fff; }
        .gal-card img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.8); color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 12px; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 10px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>ARK ADMIN</h2>
    <p style="color: #666; font-size: 13px; text-align: center;">Mission Control Center</p>
</div>

<div class="main-content">
    <h1>ARK Archive Master Control</h1>

    <div class="card">
        <h3>Section 1: Live Stats Control</h3>
        <div class="input-row">
            <input type="number" id="s-col" placeholder="Collected ($)">
            <input type="number" id="s-bought" placeholder="Trees Bought">
            <input type="number" id="s-deliv" placeholder="Handed Over">
        </div>
        <button class="btn-save" onclick="updateStats()">UPDATE LIVE STATS</button>
    </div>

    <div class="card">
        <h3>Section 2: Mission Gallery (Image Links)</h3>
        <div class="input-row">
            <input type="text" id="gal-img" placeholder="Paste Image URL here...">
            <input type="text" id="gal-link" placeholder="Redirect Link (Optional)">
            <button class="btn-upload" onclick="addGallery()">ADD TO GALLERY</button>
        </div>
        <div class="gallery-grid" id="gal-list">
            </div>
    </div>

    <div class="card">
        <h3>Section 3: Legacy Archive Grid</h3>
        <div class="input-row">
            <input type="text" id="d-name" placeholder="Donor Name">
            <input type="number" id="d-trees" placeholder="Trees">
            <input type="text" id="d-photo" placeholder="Photo URL">
            <input type="hidden" id="edit-key">
        </div>
        <button class="btn-save" id="donor-btn" style="background: #333;" onclick="saveDonor()">ADD TO ARCHIVE</button>
        
        <table id="donor-table">
            <thead><tr><th>Donor</th><th>Qty</th><th>Action</th></tr></thead>
            <tbody id="donor-tbody"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>Section 4: Recent Donation Requests</h3>
        <div id="request-container">Loading...</div>
    </div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
        authDomain: "the-5k-elite-legacy.firebaseapp.com",
        databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
        projectId: "the-5k-elite-legacy",
        storageBucket: "the-5k-elite-legacy.firebasestorage.app",
        messagingSenderId: "440824313752",
        appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Stats Sync
    db.ref('stats').on('value', snap => {
        const d = snap.val() || { collected: 0, bought: 0, delivered: 0 };
        document.getElementById('s-col').value = d.collected;
        document.getElementById('s-bought').value = d.bought;
        document.getElementById('s-deliv').value = d.delivered;
    });

    function updateStats() {
        db.ref('stats').set({
            collected: parseInt(document.getElementById('s-col').value) || 0,
            bought: parseInt(document.getElementById('s-bought').value) || 0,
            delivered: parseInt(document.getElementById('s-deliv').value) || 0
        }).then(() => alert("Stats Updated Successfully!"));
    }

    // 2. Gallery Logic (With Delete Option like in your image)
    function addGallery() {
        const url = document.getElementById('gal-img').value;
        const link = document.getElementById('gal-link').value || "#";
        if(url) {
            db.ref('gallery').push({ image: url, link: link }).then(() => {
                document.getElementById('gal-img').value = '';
                document.getElementById('gal-link').value = '';
            });
        }
    }

    db.ref('gallery').on('value', snap => {
        const container = document.getElementById('gal-list');
        container.innerHTML = '';
        snap.forEach(child => {
            const data = child.val();
            container.innerHTML += `
                <div class="gal-card">
                    <img src="${data.image}">
                    <button class="del-btn" onclick="removeItem('gallery/${child.key}')">×</button>
                </div>`;
        });
    });

    // 3. Legacy Archive Logic
    function saveDonor() {
        const key = document.getElementById('edit-key').value;
        const data = {
            name: document.getElementById('d-name').value,
            trees: document.getElementById('d-trees').value,
            photo: document.getElementById('d-photo').value || "https://via.placeholder.com/50",
            link: "#"
        };
        if(key) db.ref('legacy_archive/' + key).update(data);
        else db.ref('legacy_archive').push(data);
        
        // Reset inputs
        document.getElementById('edit-key').value = '';
        document.getElementById('donor-btn').innerText = "ADD TO ARCHIVE";
        ['d-name','d-trees','d-photo'].forEach(i => document.getElementById(i).value = '');
    }

    db.ref('legacy_archive').on('value', snap => {
        const body = document.getElementById('donor-tbody');
        body.innerHTML = '';
        snap.forEach(child => {
            const d = child.val();
            body.innerHTML += `<tr>
                <td><img src="${d.photo}" class="avatar">${d.name}</td>
                <td>${d.trees}</td>
                <td>
                    <button style="background:#ffc107; padding:5px 10px;" onclick="editD('${child.key}','${d.name}','${d.trees}','${d.photo}')">Edit</button>
                    <button style="background:red; color:white; padding:5px 10px;" onclick="removeItem('legacy_archive/${child.key}')">Del</button>
                </td>
            </tr>`;
        });
    });

    function editD(k,n,t,p) {
        document.getElementById('d-name').value = n;
        document.getElementById('d-trees').value = t;
        document.getElementById('d-photo').value = p;
        document.getElementById('edit-key').value = k;
        document.getElementById('donor-btn').innerText = "UPDATE DONOR";
    }

    // 4. Requests Logic
    db.ref('donation_requests').on('value', snap => {
        const cont = document.getElementById('request-container');
        cont.innerHTML = '';
        if(!snap.exists()) cont.innerHTML = "No requests found.";
        snap.forEach(child => {
            const r = child.val();
            cont.innerHTML += `
            <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                <span><b>${r.name}</b> wants to plant ${r.qty} trees</span>
                <div>
                    <button style="background:green; color:white;" onclick="approve('${child.key}','${r.name}','${r.qty}')">Complete</button>
                    <button style="background:red; color:white;" onclick="removeItem('donation_requests/${child.key}')">X</button>
                </div>
            </div>`;
        });
    });

    function approve(key, n, q) {
        db.ref('legacy_archive').push({ name: n, trees: q, photo: "", link: "#" });
        db.ref('donation_requests/' + key).remove();
        alert("Moved to Archive!");
    }

    function removeItem(path) {
        if(confirm("Are you sure?")) db.ref(path).remove();
    }
</script>
</body>
</html>
