<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK ADMIN | Global Control Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otplib/12.0.1/otplib-browser.all.min.js"></script>

    <style>
        :root { --cyan: #00BFFF; --pink: #FF1493; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        
        /* New Secure Login UI */
        .login-container { max-width: 400px; width: 90%; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; border-top: 6px solid var(--cyan); position: relative; }
        .login-container h2 { font-size: 22px; margin-bottom: 25px; letter-spacing: 1px; color: var(--dark); }
        .login-container input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        .login-container input:focus { border-color: var(--cyan); outline: none; box-shadow: 0 0 10px rgba(0, 191, 255, 0.2); }
        .btn-login { width: 100%; padding: 15px; background: var(--dark); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; letter-spacing: 1px; }
        
        /* Admin Content */
        .container { max-width: 1000px; width: 100%; margin: 0 auto; display: none; background: #f0f2f5; min-height: 100vh; padding: 20px; border-radius: 15px; }
        header { background: var(--dark); color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h2 { border-left: 5px solid var(--cyan); padding-left: 15px; margin-bottom: 20px; color: #1e293b; font-size: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .btn-save { background: var(--cyan); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .logout-btn { background: #ef4444; color: white; padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; }
        
        #step-2 { display: none; }
    </style>
</head>
<body>

<div id="login-section" class="login-container">
    <div id="step-1">
        <div style="width: 50px; height: 5px; background: var(--cyan); margin: 0 auto 20px; border-radius: 10px;"></div>
        <h2>ARK SYSTEM LOCK</h2>
        <input type="password" id="sys-pass" placeholder="Enter Master Password">
        <button class="btn-login" onclick="validateStep1()">NEXT STEP</button>
    </div>
    
    <div id="step-2">
        <div style="width: 50px; height: 5px; background: var(--pink); margin: 0 auto 20px; border-radius: 10px;"></div>
        <h2>2FA VERIFICATION</h2>
        <p style="font-size: 13px; color: #64748b; margin-bottom: 15px;">Enter the 6-digit code from your app</p>
        <input type="text" id="otp-code" placeholder="0 0 0 0 0 0" maxlength="6" style="text-align:center; font-size: 24px; letter-spacing: 8px; font-weight: bold;">
        <button class="btn-login" onclick="validateStep2()" style="background: var(--pink);">VERIFY & ACCESS</button>
    </div>
    <p id="err-msg" style="color: #ef4444; font-size: 13px; margin-top: 15px; font-weight: 500;"></p>
</div>

<div id="admin-content" class="container">
    <header>
        <h1 style="font-size: 22px; margin: 0;">ARK ARCHIVE <span style="color: var(--cyan);">ADMIN</span></h1>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </header>

    <div class="card">
        <h2>Section 1: Live Stats Control</h2>
        <div class="grid-3">
            <div><label>Collected ($)</label><input type="number" id="in-coll"></div>
            <div><label>Trees Bought</label><input type="number" id="in-bought"></div>
            <div><label>Handed Over</label><input type="number" id="in-del"></div>
        </div>
        <button class="btn-save" onclick="updateStats()">UPDATE LIVE STATS</button>
    </div>

    <div class="card">
        <h2>Section 2: Mission Gallery</h2>
        <input type="text" id="gal-url" placeholder="Paste Image URL here...">
        <button style="background: var(--pink); color:white; width: 100%; padding: 12px; border-radius: 8px; border:none; cursor:pointer; font-weight:bold;" onclick="addGal()">ADD TO GALLERY</button>
        <div id="gal-list" style="margin-top:20px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
    </div>
    
    <p style="text-align: center; color: #94a3b8; font-size: 12px;">Security Level: 99.9% MILITARY GRADE</p>
</div>

<script>
    // --- OBFUSCATED SECURITY KEYS ---
    // pass: KAWSARahmed22@@ | key: JBSWY3DPEHPK3PXP
    const _0x55a1 = ["\x4b\x41\x57\x53\x41\x52\x61\x68\x6d\x65\x64\x32\x32\x40\x40", "\x4a\x42\x53\x57\x59\x33\x44\x50\x45\x48\x50\x4b\x33\x50\x58\x50"];

    // Firebase Initialization
    const firebaseConfig = {
        apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
        authDomain: "the-5k-elite-legacy.firebaseapp.com",
        databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
        projectId: "the-5k-elite-legacy",
        storageBucket: "the-5k-elite-legacy.firebasestorage.app",
        appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function validateStep1() {
        const p = document.getElementById('sys-pass').value;
        if(p === _0x55a1[0]) {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
            document.getElementById('err-msg').innerText = "";
        } else {
            document.getElementById('err-msg').innerText = "Access Denied: Invalid Master Password";
        }
    }

    function validateStep2() {
        const code = document.getElementById('otp-code').value;
        const isValid = otplib.authenticator.check(code, _0x55a1[1]);

    function enterPanel() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        document.body.style.background = "#f0f2f5";
        loadData();

    function logout() {
        sessionStorage.clear();

    // --- Original Functions ---
    function loadData() {
        db.ref('stats').on('value', s => {
            const d = s.val() || {};
            document.getElementById('in-coll').value = d.collected || 0;
            document.getElementById('in-bought').value = d.bought || 0;
            document.getElementById('in-del').value = d.delivered || 0;
        });
    }

    function updateStats() {
        db.ref('stats').set({
            collected: parseInt(document.getElementById('in-coll').value),
            bought: parseInt(document.getElementById('in-bought').value),
            delivered: parseInt(document.getElementById('in-del').value)
        }).then(() => alert("Stats Synchronized!"));
    }

    function addGal() {
        const u = document.getElementById('gal-url').value;
        if(u) db.ref('gallery').push(u).then(() => document.getElementById('gal-url').value = "");
    }
</script>

</body>
</html>
