<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK MASTER ADMIN | Global Control</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #00BFFF; --accent: #FF1493; --dark: #121212; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; margin: 0; display: flex; }
        
        .sidebar { width: 260px; height: 100vh; background: var(--dark); color: white; position: fixed; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { color: var(--primary); font-size: 22px; border-bottom: 1px solid #333; padding-bottom: 15px; }

        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 40px; box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 30px; border-top: 4px solid var(--primary); }
        h3 { margin-top: 0; color: #333; font-size: 18px; margin-bottom: 20px; }

        .input-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; width: 100%; box-sizing: border-box; }
        
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; padding: 10px 18px; }
        .btn-save { background: var(--primary); color: white; width: 100%; padding: 15px; font-size: 16px; margin-top: 10px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .gal-item { position: relative; border-radius: 10px; overflow: hidden; height: 110px; border: 2px solid #eee; }
        .gal-item img { width: 100%; height: 100%; object-fit: cover; }
        .gal-del { position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 10px; vertical-align: middle; }
        
        .btn-edit { background: #ffc107; color: black; margin-right: 5px; }
        .btn-delete { background: var(--danger); color: white; }
        .btn-approve { background: var(--success); color: white; }

        .req-box { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .req-info { display: flex; flex-direction: column; gap: 4px; }
        .req-email { font-size: 12px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>ARK ADMIN</h2>
    <p style="color: #666; font-size: 12px;">Active Project: ARK Archive</p>
</div>

<div class="main-content">
    <h1>ARK Archive Control Panel</h1>

    <div class="card">
        <h3>📊 Section 1: Live Stats Counter</h3>
        <div class="input-row">
            <div><label>Collected ($)</label><input type="number" id="s-col"></div>
            <div><label>Trees Bought</label><input type="number" id="s-bought"></div>
            <div><label>Handed Over</label><input type="number" id="s-deliv"></div>
        </div>
        <button class="btn-save" onclick="updateStats()">SYNC ALL STATS</button>
    </div>

    <div class="card">
        <h3>🖼 Section 2: Mission Progress Gallery</h3>
        <div class="input-row">
            <input type="text" id="gal-img" placeholder="Paste Photo URL">
            <button style="background: var(--accent); color: white;" onclick="addGallery()">UPLOAD</button>
        </div>
        <div class="gallery-grid" id="gallery-list"></div>
    </div>

    <div class="card">
        <h3>🏆 Section 3: Legacy Archive (Donor Grid)</h3>
        <div class="input-row">
            <input type="text" id="d-name" placeholder="Donor Name">
            <input type="number" id="d-trees" placeholder="Tree Count">
            <input type="text" id="d-photo" placeholder="Photo URL">
            <input type="text" id="d-link" placeholder="Profile Link">
            <input type="hidden" id="edit-key">
        </div>
        <button class="btn-save" id="save-donor-btn" style="background: var(--dark);" onclick="saveDonor()">SAVE DONOR</button>

        <table>
            <thead><tr><th>Donor Info</th><th>Trees</th><th>Actions</th></tr></thead>
            <tbody id="donor-table-body"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>✉ Section 4: Pending Donation Requests</h3>
        <div id="req-list" style="color: #999; text-align: center; padding: 20px;">Scanning...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
        authDomain: "the-5k-elite-legacy.firebaseapp.com",
        databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
        projectId: "the-5k-elite-legacy",
        storageBucket: "the-5k-elite-legacy.firebasestorage.app",
        messagingSenderId: "440824313752",
        appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 1. Stats ---
    db.ref('stats').on('value', snap => {
        const d = snap.val() || { collected: 0, bought: 0, delivered: 0 };
        document.getElementById('s-col').value = d.collected;
        document.getElementById('s-bought').value = d.bought;
        document.getElementById('s-deliv').value = d.delivered;
    });

    function updateStats() {
        db.ref('stats').set({
            collected: parseInt(document.getElementById('s-col').value) || 0,
            bought: parseInt(document.getElementById('s-bought').value) || 0,
            delivered: parseInt(document.getElementById('s-deliv').value) || 0
        }).then(() => alert("Stats Updated!"));
    }

    // --- 2. Gallery ---
    function addGallery() {
        const img = document.getElementById('gal-img').value;
        if(img) {
            db.ref('gallery').push({ image: img, link: "#" }).then(() => {
                document.getElementById('gal-img').value = '';
            });
        }
    }

    db.ref('gallery').on('value', snap => {
        const list = document.getElementById('gallery-list');
        list.innerHTML = '';
        snap.forEach(child => {
            const item = child.val();
            list.innerHTML += `
                <div class="gal-item">
                    <img src="${item.image}">
                    <button class="gal-del" onclick="delItem('gallery/${child.key}')">×</button>
                </div>`;
        });
    });

    // --- 3. Legacy Archive (Fixed Edit/Save) ---
    function saveDonor() {
        const key = document.getElementById('edit-key').value;
        const data = {
            name: document.getElementById('d-name').value,
            trees: document.getElementById('d-trees').value,
            photo: document.getElementById('d-photo').value || "https://via.placeholder.com/100",
            link: document.getElementById('d-link').value || "#"
        };
        
        if(!data.name || !data.trees) return alert("Fill Name and Trees!");

        if(key) {
            db.ref('legacy_archive/' + key).set(data).then(() => {
                alert("Updated!");
                resetDonorForm();
            });
        } else {
            db.ref('legacy_archive').push(data).then(() => {
                alert("Saved!");
                resetDonorForm();
            });
        }
    }

    function resetDonorForm() {
        document.getElementById('edit-key').value = '';
        document.getElementById('d-name').value = '';
        document.getElementById('d-trees').value = '';
        document.getElementById('d-photo').value = '';
        document.getElementById('d-link').value = '';
        document.getElementById('save-donor-btn').innerText = "SAVE DONOR";
    }

    db.ref('legacy_archive').on('value', snap => {
        const tbody = document.getElementById('donor-table-body');
        tbody.innerHTML = '';
        snap.forEach(child => {
            const d = child.val();
            tbody.innerHTML += `<tr>
                <td><img src="${d.photo}" class="avatar"><b>${d.name}</b></td>
                <td>${d.trees} Trees</td>
                <td>
                    <button class="btn-edit" onclick="editD('${child.key}','${d.name}','${d.trees}','${d.photo}','${d.link}')">Edit</button>
                    <button class="btn-delete" onclick="delItem('legacy_archive/${child.key}')">Del</button>
                </td>
            </tr>`;
        });
    });

    function editD(k, n, t, p, l) {
        document.getElementById('d-name').value = n;
        document.getElementById('d-trees').value = t;
        document.getElementById('d-photo').value = p;
        document.getElementById('d-link').value = l;
        document.getElementById('edit-key').value = k;
        document.getElementById('save-donor-btn').innerText = "UPDATE DONOR INFO";
        window.scrollTo(0, 500);
    }

    // --- 4. Donation Requests (Fixed Approve/Reject) ---
    db.ref('donation_requests').on('value', snap => {
        const list = document.getElementById('req-list');
        list.innerHTML = '';
        if(!snap.exists()) {
            list.innerHTML = "No pending requests.";
            return;
        }
        snap.forEach(child => {
            const r = child.val();
            list.innerHTML += `
            <div class="req-box">
                <div class="req-info">
                    <span><b>${r.name}</b> (${r.qty} trees)</span>
                    <span class="req-email">Email: ${r.email}</span>
                </div>
                <div>
                    <button class="btn-approve" onclick="approveReq('${child.key}','${r.name}','${r.qty}')">Approve</button>
                    <button class="btn-delete" onclick="delItem('donation_requests/${child.key}')">Reject</button>
                </div>
            </div>`;
        });
    });

    function approveReq(key, n, q) {
        db.ref('legacy_archive').push({
            name: n,
            trees: q,
            photo: "https://via.placeholder.com/100",
            link: "#"
        }).then(() => {
            db.ref('donation_requests/' + key).remove();
            alert("Approved!");
        });
    }

    // Global Delete
    function delItem(path) {
        if(confirm("Are you sure?")) {
            db.ref(path).remove().then(() => alert("Deleted!"));
        }
    }
</script>
</body>
</html>
