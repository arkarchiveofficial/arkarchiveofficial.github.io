<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK | Admin Control Panel</title>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --cyan: #00BFFF; --pink: #FF1493; --dark: #0f172a; --light: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--light); margin: 0; padding: 0; color: #1e293b; }
        
        /* Auth Screen */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .auth-card {
            background: white; padding: 40px; border-radius: 16px; width: 340px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .auth-card h1 { font-size: 22px; color: var(--dark); margin-bottom: 25px; letter-spacing: 1px; }
        .auth-card input { 
            width: 100%; padding: 14px; margin-bottom: 20px; border: 2px solid #e2e8f0; 
            border-radius: 10px; box-sizing: border-box; text-align: center; font-size: 16px;
        }
        .auth-card button { 
            background: var(--cyan); color: white; width: 100%; padding: 14px; border: none; 
            border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 14px;
        }

        /* Dashboard Styles */
        .header { background: var(--dark); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        
        .card { background: white; border-radius: 15px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid var(--cyan); }
        .card.alt { border-left-color: var(--pink); }
        
        h2 { margin-top: 0; font-size: 18px; color: var(--dark); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .input-box { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 700; color: #64748b; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        
        .action-btn { 
            width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 700; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
        }
        .update-btn { background: var(--cyan); color: white; }
        .add-btn { background: var(--pink); color: white; }
        .action-btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .list-container { margin-top: 20px; max-height: 250px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 15px; }
        .list-item { display: flex; justify-content: space-between; background: #f8fafc; padding: 10px; margin-bottom: 8px; border-radius: 6px; font-size: 12px; }
        .trash { color: #ef4444; cursor: pointer; }

        .logout-link { color: #94a3b8; cursor: pointer; font-size: 13px; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1><i class="fas fa-user-shield"></i> ADMIN LOGIN</h1>
            <input type="password" id="pass-field" placeholder="Access Password" onkeypress="if(event.key === 'Enter') validateAdmin()">
            <button onclick="validateAdmin()">UNLOCK PANEL</button>
            <p id="err-log" style="color:red; font-size:12px; margin-top:15px; display:none;">Unauthorized Access Detected</p>
        </div>
    </div>

    <div id="admin-panel" style="display:none;">
        <div class="header">
            <h3><i class="fas fa-leaf"></i> ARK MISSION CONTROL</h3>
            <span class="logout-link" onclick="exitAdmin()">Secure Logout</span>
        </div>

        <div class="container">
            
            <div class="card">
                <h2><i class="fas fa-globe"></i> Main Website Stats</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                    <div class="input-box"><label>Collected ($)</label><input type="number" id="val-coll"></div>
                    <div class="input-box"><label>Bought</label><input type="number" id="val-bought"></div>
                    <div class="input-box"><label>Delivered</label><input type="number" id="val-deliv"></div>
                </div>
                <button class="action-btn update-btn" onclick="syncStats()">Update Dashboard</button>
            </div>

            <div class="card alt">
                <h2><i class="fas fa-camera"></i> Mission Photo Feed</h2>
                <div class="input-box">
                    <label>Direct Image Link</label>
                    <input type="text" id="val-img" placeholder="https://...">
                </div>
                <button class="action-btn add-btn" onclick="pushImage()">Add to Gallery</button>
                <div id="image-feed" class="list-container"></div>
            </div>

            <div class="card">
                <h2><i class="fas fa-heart"></i> Register Donor Plot</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-box"><label>Donor Name</label><input type="text" id="d-name"></div>
                    <div class="input-box"><label>Trees</label><input type="number" id="d-tree"></div>
                </div>
                <div class="input-box"><label>Profile Image URL</label><input type="text" id="d-img"></div>
                <div class="input-box"><label>Social Link</label><input type="text" id="d-url"></div>
                <button class="action-btn update-btn" onclick="registerDonor()">Confirm Legacy Plot</button>
            </div>

        </div>
    </div>

<script>
    // Camouflage Key Generation
    const _keyParts = [
        [84, 84, 97, 112, 66, 107],
        [84, 113, 114, 68, 110, 122, 72, 98, 87],
        [122, 101, 107, 54, 119, 83, 66, 85, 84, 99, 74, 75, 70, 109, 82, 56, 87, 115, 54]
    ];

    function validateAdmin() {
        const input = document.getElementById('pass-field').value;
        const decodedKey = _keyParts.flat().map(c => String.fromCharCode(c)).join('');
        
        if (input === decodedKey) {
            localStorage.setItem('ark_session', 'active');
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            initFirebaseOps();
        } else {
            document.getElementById('err-log').style.display = 'block';
            document.getElementById('pass-field').value = '';
        }
    }

    // Auto-login if session exists
    if(localStorage.getItem('ark_session') === 'active') {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        window.onload = initFirebaseOps;
    }

    function exitAdmin() {
        localStorage.removeItem('ark_session');
        location.reload();
    }

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
        authDomain: "the-5k-elite-legacy.firebaseapp.com",
        databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
        projectId: "the-5k-elite-legacy",
        storageBucket: "the-5k-elite-legacy.firebasestorage.app",
        messagingSenderId: "440824313752",
        appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function initFirebaseOps() {
        // Load Stats
        db.ref('stats').on('value', s => {
            const d = s.val() || {collected:0, bought:0, delivered:0};
            document.getElementById('val-coll').value = d.collected;
            document.getElementById('val-bought').value = d.bought;
            document.getElementById('val-deliv').value = d.delivered;
        });

        // Load Gallery
        db.ref('gallery').on('value', s => {
            const box = document.getElementById('image-feed');
            box.innerHTML = '<strong>Live Feed:</strong><br>';
            s.forEach(child => {
                box.innerHTML += `<div class="list-item"><span>${child.val().substring(0,40)}...</span><i class="fas fa-trash trash" onclick="removeItem('gallery/${child.key}')"></i></div>`;
            });
        });
    }

    function syncStats() {
        db.ref('stats').set({
            collected: parseInt(document.getElementById('val-coll').value) || 0,
            bought: parseInt(document.getElementById('val-bought').value) || 0,
            delivered: parseInt(document.getElementById('val-deliv').value) || 0
        }).then(() => alert("Cloud Sync Complete"));
    }

    function pushImage() {
        const url = document.getElementById('val-img').value;
        if(url) db.ref('gallery').push(url).then(() => document.getElementById('val-img').value = '');
    }

    function registerDonor() {
        const payload = {
            name: document.getElementById('d-name').value,
            photo: document.getElementById('d-img').value,
            link: document.getElementById('d-url').value || "#",
            trees: document.getElementById('d-tree').value || 0,
            timestamp: Date.now()
        };
        if(payload.name && payload.photo) {
            db.ref('legacy_archive').push(payload).then(() => {
                alert("Plot Assigned Successfully");
                ['d-name', 'd-img', 'd-url', 'd-tree'].forEach(id => document.getElementById(id).value = '');
            });
        }
    }

    function removeItem(path) {
        if(confirm("Permanent Delete?")) db.ref(path).remove();
    }
</script>
</body>
</html>
