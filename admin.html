<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK ADMIN | Advanced Global Control</title>
    
    <script>
        function checkAccess() {
            const pass = "zoomlink34@gmail.com";
            let enteredPass = prompt("Please enter Admin Password to access:");
            if (enteredPass !== pass) {
                alert("Incorrect Password! Access Denied.");
                document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:50px;'>UNAUTHORIZED ACCESS</h1>";
                window.stop(); 
            } else {
                document.getElementById('admin-content').style.display = 'block';
            }
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --cyan: #00BFFF; --pink: #FF1493; --dark: #1a1a1a; --success: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { background: var(--dark); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h2 { border-left: 5px solid var(--cyan); padding-left: 15px; margin-bottom: 20px; color: #333; font-size: 20px; }
        
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { cursor: pointer; padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; font-size: 13px; }
        
        .btn-save { background: var(--cyan); color: white; width: 100%; padding: 15px; margin-top: 10px; }
        .btn-add { background: var(--pink); color: white; margin-top: 10px; }
        .btn-confirm { background: var(--success); color: white; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-edit { background: #ffc107; color: #000; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; }

        .req-card { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .action-group { display: flex; gap: 8px; }
    </style>
</head>

<body onload="checkAccess()">

<div id="admin-content" style="display:none;">
    <div class="container">
        <header>
            <h1>ARK ARCHIVE ADMIN</h1>
            <div id="status-indicator" style="color: #00ff00;">● System Active</div>
        </header>

        <div class="card">
            <h2>Section 1: Live Stats Control</h2>
            <div class="grid-3">
                <div><label>Collected ($)</label><input type="number" id="input-collected"></div>
                <div><label>Trees Bought</label><input type="number" id="input-bought"></div>
                <div><label>Handed Over</label><input type="number" id="input-delivered"></div>
            </div>
            <button class="btn-save" onclick="updateStats()">UPDATE LIVE STATS</button>
        </div>

        <div class="card">
            <h2>Section 2: Mission Gallery (Image & Web Link)</h2>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="gallery-url" placeholder="Paste Image URL...">
                <input type="text" id="gallery-web-link" placeholder="Paste Destination/Social Link...">
            </div>
            <button class="btn-add" onclick="addToGallery()">ADD TO GALLERY</button>
            <div id="gallery-list" style="margin-top:15px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
        </div>

        <div class="card">
            <h2>Section 3: Legacy Archive (Donor Management)</h2>
            <div class="grid-3">
                <input type="text" id="donor-name" placeholder="Donor Name">
                <input type="text" id="donor-photo" placeholder="Photo URL">
                <input type="text" id="donor-link" placeholder="Social Link">
            </div>
            <input type="number" id="donor-trees" placeholder="Number of Trees">
            <input type="hidden" id="edit-donor-id">
            <button id="donor-btn" class="btn-add" style="background: var(--cyan);" onclick="saveToArchive()">ADD TO LEGACY GRID</button>
            
            <table id="archive-table">
                <thead>
                    <tr><th>Name</th><th>Trees</th><th>Actions</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="card">
            <h2>Section 4: Recent Donation Requests</h2>
            <div id="request-list">Loading...</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
        authDomain: "the-5k-elite-legacy.firebaseapp.com",
        databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
        projectId: "the-5k-elite-legacy",
        storageBucket: "the-5k-elite-legacy.firebasestorage.app",
        messagingSenderId: "440824313752",
        appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 1. Stats Logic ---
    db.ref('stats').on('value', snap => {
        const d = snap.val() || { collected: 0, bought: 0, delivered: 0 };
        document.getElementById('input-collected').value = d.collected;
        document.getElementById('input-bought').value = d.bought;
        document.getElementById('input-delivered').value = d.delivered;
    });
    function updateStats() {
        db.ref('stats').set({
            collected: parseInt(document.getElementById('input-collected').value) || 0,
            bought: parseInt(document.getElementById('input-bought').value) || 0,
            delivered: parseInt(document.getElementById('input-delivered').value) || 0
        }).then(() => alert("Stats Updated!"));
    }

    // --- 2. Gallery Logic ---
    function addToGallery() {
        const img = document.getElementById('gallery-url').value;
        const web = document.getElementById('gallery-web-link').value;
        if(img && web) {
            db.ref('gallery').push({ image: img, link: web });
            document.getElementById('gallery-url').value = '';
            document.getElementById('gallery-web-link').value = '';
        }
    }
    db.ref('gallery').on('value', snap => {
        const list = document.getElementById('gallery-list');
        list.innerHTML = '';
        snap.forEach(child => {
            const data = child.val();
            list.innerHTML += `<div style="position:relative; border:1px solid #ddd; padding:5px; border-radius:5px;">
                <img src="${data.image}" width="80" height="60" style="object-fit:cover;">
                <br><button class="btn-delete" style="padding:2px 5px; font-size:10px;" onclick="deleteItem('gallery/${child.key}')">Remove</button>
            </div>`;
        });
    });

    // --- 3. Legacy Archive Logic (Add & Edit) ---
    function saveToArchive() {
        const id = document.getElementById('edit-donor-id').value;
        const data = {
            name: document.getElementById('donor-name').value,
            photo: document.getElementById('donor-photo').value,
            link: document.getElementById('donor-link').value,
            trees: document.getElementById('donor-trees').value
        };
        if(id) {
            db.ref('legacy_archive/' + id).update(data);
            document.getElementById('edit-donor-id').value = "";
            document.getElementById('donor-btn').innerText = "ADD TO LEGACY GRID";
        } else {
            db.ref('legacy_archive').push(data);
        }
        alert("Success!");
    }
    db.ref('legacy_archive').on('value', snap => {
        const tbody = document.querySelector('#archive-table tbody');
        tbody.innerHTML = '';
        snap.forEach(child => {
            const d = child.val();
            tbody.innerHTML += `<tr>
                <td>${d.name}</td><td>${d.trees}</td>
                <td>
                    <button class="btn-edit" onclick="editDonor('${child.key}')">Edit</button>
                    <button class="btn-delete" onclick="deleteItem('legacy_archive/${child.key}')">Del</button>
                </td>
            </tr>`;
        });
    });
    function editDonor(key) {
        db.ref('legacy_archive/' + key).once('value', snap => {
            const d = snap.val();
            document.getElementById('donor-name').value = d.name;
            document.getElementById('donor-photo').value = d.photo;
            document.getElementById('donor-link').value = d.link;
            document.getElementById('donor-trees').value = d.trees;
            document.getElementById('edit-donor-id').value = key;
            document.getElementById('donor-btn').innerText = "UPDATE DONOR INFO";
        });
    }

    // --- 4. Donation Requests Logic (Confirm & Delete) ---
    db.ref('donation_requests').on('value', snap => {
        const reqList = document.getElementById('request-list');
        reqList.innerHTML = snap.exists() ? '' : '<p>No pending requests.</p>';
        snap.forEach(child => {
            const r = child.val();
            reqList.innerHTML += `
                <div class="req-card">
                    <div><strong>${r.name}</strong> - ${r.qty} trees</div>
                    <div class="action-group">
                        <button class="btn-confirm" onclick="confirmRequest('${child.key}', '${r.name}', ${r.qty})">Confirm</button>
                        <button class="btn-delete" onclick="deleteItem('donation_requests/${child.key}')">Delete</button>
                    </div>
                </div>`;
        });
    });
    function confirmRequest(key, name, qty) {
        if(confirm("Confirm this donation? This will remove it from requests.")) {
            // এখানে আপনি চাইলে ডোনার আর্কাইভে অটো পাঠানোর লজিক দিতে পারেন
            deleteItem('donation_requests/' + key);
        }
    }

    function deleteItem(path) {
        if(confirm("Are you sure?")) db.ref(path).remove();
    }
</script>
</body>
</html>
